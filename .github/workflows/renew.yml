name: Back4app Auto Redeploy (Node.js Matrix)

on:
  schedule:
    - cron: '0 22 * * *' 
  workflow_dispatch:
    inputs:
      T:
        description: '执行次数 (默认12)'
        required: false
        default: '12'
      start_round:
        description: '起始轮次 (用于分段恢复)'
        required: false
        default: '1'
      max_parallel:
        description: '同时运行的并发数 (默认1)'
        required: false
        default: '1'

permissions:
  contents: write

env:
  T: ${{ github.event.inputs.T || '12' }}
  START_ROUND: ${{ github.event.inputs.start_round || '1' }}
  MAX_PARALLEL: ${{ github.event.inputs.max_parallel || '1' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      total_rounds: ${{ steps.set-matrix.outputs.total_rounds }}
      max_parallel: ${{ steps.set-matrix.outputs.max_parallel }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate account list
        id: set-matrix
        shell: bash
        env:
          ALL_SECRETS: ${{ toJson(secrets) }}
          T: ${{ env.T }}
          MAX_HOURS: 6
        run: |
          # 提取 EML 后缀并按数字大小排正序
          ACCOUNTS=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(startswith("EML_")) | sub("EML_";"")' | sort -n)
          if [ -z "$ACCOUNTS" ]; then
            HAS_SINGLE=$(echo "$ALL_SECRETS" | jq -r 'keys[] | select(. == "EML")')
            if [ -n "$HAS_SINGLE" ]; then
              echo "matrix=[{\"acc\":\"SINGLE\", \"idx\":0}]" >> $GITHUB_OUTPUT
            else
              echo "Error: No EML_1 or EML secrets found."
              exit 1
            fi
          else
            # 将账号映射为严格按 0,1,2,3 递增的 JSON 数组
            MATRIX_JSON=$(echo "$ACCOUNTS" | awk '{print "{\"acc\":\""$1"\", \"idx\":"NR-1"}"}' | jq -s -c '.')
            echo "matrix=$MATRIX_JSON" >> $GITHUB_OUTPUT
          fi
          
          echo "max_parallel=${{ env.MAX_PARALLEL }}" >> $GITHUB_OUTPUT
          
          TOTAL_ACCOUNTS=$(echo "$matrix" | jq 'length')
          ROUNDS_PER_ACCOUNT=$T
          
          ESTIMATED_HOURS=$(echo "scale=2; $TOTAL_ACCOUNTS * $ROUNDS_PER_ACCOUNT * 1.2 / 60" | bc)
          echo "估算运行时长: ${ESTIMATED_HOURS} 小时 (T=$T, 账号数=$TOTAL_ACCOUNTS)"
          echo "total_rounds=$T" >> $GITHUB_OUTPUT

  renew:
    needs: setup
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(needs.setup.outputs.max_parallel) }}
      matrix:
        include: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx playwright install --with-deps chrome
          sudo apt-get update
          sudo apt-get install -y jq fonts-noto-cjk python3 wget bc

      - name: Start Proxy Tunnel
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "$PROXY_URL" ]; then exit 0; fi
          
          SINGBOX_VER="1.11.0"
          echo "下载 sing-box v${SINGBOX_VER}..."
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          
          echo "解析代理协议..."
          python3 proxy_handler.py
          
          if [ -f config.json ]; then
            echo "代理配置已生成"
            nohup ./sing-box run -c config.json > singbox.log 2>&1 &
            sleep 5
            echo "Proxy tunnel started"
          else
            echo "代理配置生成失败"
            exit 1
          fi

      - name: Run Extension Script
        env:
          ACC: ${{ matrix.acc == 'SINGLE' && secrets.EML || secrets[format('EML_{0}', matrix.acc)] }}
          ACC_PWD: ${{ matrix.acc == 'SINGLE' && secrets.PWD || secrets[format('PWD_{0}', matrix.acc)] }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_ID: ${{ secrets.TG_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          APP_NAME: ${{ matrix.acc == 'SINGLE' && secrets.APP_NAME || secrets[format('APP_NAME_{0}', matrix.acc)] }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          T: ${{ env.T }}
          ACCOUNT_INDEX: ${{ matrix.idx }}
          MAX_PARALLEL: ${{ needs.setup.outputs.max_parallel }}
          START_ROUND: ${{ env.START_ROUND }}
        run: node renew.js

      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.acc }}
          path: "*.png"
          retention-days: 5

      - name: Persist status_${{ matrix.idx }}.json
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || echo "No remote changes"
          STATUS_FILE="status_${{ matrix.idx }}.json"
          if [ -f "$STATUS_FILE" ]; then
            git add "$STATUS_FILE"
            git commit -m "chore: Update $STATUS_FILE for account ${{ matrix.acc }} [skip ci]" || echo "No changes"
            git push
          fi

      - name: Check if need next wave
        id: check-next
        if: always()
        shell: bash
        env:
          T: ${{ env.T }}
        run: |
          STATUS_FILE="status_${{ matrix.idx }}.json"
          if [ -f "$STATUS_FILE" ]; then
            CURRENT=$(jq -r '.currentRound // 1' "$STATUS_FILE")
            if [ "$CURRENT" -le "$T" ]; then
              echo "NEXT_WAVE=true" >> $GITHUB_OUTPUT
              echo "剩余轮次检测到，当前进度: $CURRENT / $T"
            else
              echo "NEXT_WAVE=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "NEXT_WAVE=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger next wave
        if: always() && steps.check-next.outputs.NEXT_WAVE == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sleep 60
          echo "Triggering workflow again for remaining rounds..."
          gh workflow run renew.yml -f T="${{ env.T }}" -f max_parallel="${{ env.MAX_PARALLEL }}"